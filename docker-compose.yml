version: '3.8'

services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    ports:
      - "4222:4222"
    command: -js
    health_check:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  event-collector:
    image: ghcr.io/rahul09123/event-collector:latest
    container_name: event-collector
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - HTTP_ADDR=:8080
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  analyzer:
    image: ghcr.io/rahul09123/analyzer:latest
    container_name: analyzer
    ports:
      - "8081:8081"
    environment:
      - NATS_URL=nats://nats:4222
      - HTTP_ADDR=:8081
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  alert-manager:
    image: ghcr.io/rahul09123/alert-manager:latest
    container_name: alert-manager
    ports:
      - "8082:8082"
    environment:
      - NATS_URL=nats://nats:4222
      - HTTP_ADDR=:8082
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    depends_on:
      - event-collector
      - analyzer
      - alert-manager

volumes:
  prometheus_data:
