apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: krtms
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-krtms
  namespace: krtms
  labels:
    grafana_dashboard: "1"
data:
  krtms-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "type": "timeseries",
          "title": "Events Processed",
          "targets": [{"expr": "sum by (service) (krtms_events_processed_total)", "legendFormat": "{{service}}"}]
        },
        {
          "type": "timeseries",
          "title": "Alerts by Severity",
          "targets": [{"expr": "sum by (service,severity) (krtms_alerts_total)", "legendFormat": "{{service}} {{severity}}"}]
        }
      ],
      "schemaVersion": 38,
      "title": "KRTMS Runtime Security Dashboard",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: krtms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboard-krtms
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: krtms
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
