apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: krtms
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: krtms
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: krtms
        orgId: 1
        folder: KRTMS
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-krtms
  namespace: krtms
  labels:
    grafana_dashboard: "1"
data:
  krtms-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "time": {"from": "now-15m", "to": "now"},
      "refresh": "10s",
      "templating": {"list": []},
      "panels": [
        {
          "type": "timeseries",
          "title": "Events Processed",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{"expr": "sum by (service) (krtms_events_processed_total)", "legendFormat": "{{service}}"}]
        },
        {
          "type": "timeseries",
          "title": "Event Processing Rate (5m)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [{"expr": "sum by (service) (rate(krtms_events_processed_total[5m]))", "legendFormat": "{{service}}"}]
        },
        {
          "type": "timeseries",
          "title": "Alerts by Severity",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [{"expr": "sum by (service,severity) (krtms_alerts_total)", "legendFormat": "{{service}} {{severity}}"}]
        },
        {
          "type": "stat",
          "title": "Total Alerts",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [{"expr": "sum(krtms_alerts_total)"}],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            }
          }
        }
      ],
      "schemaVersion": 38,
      "title": "KRTMS Runtime Security Dashboard",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: krtms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-krtms
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: krtms
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
