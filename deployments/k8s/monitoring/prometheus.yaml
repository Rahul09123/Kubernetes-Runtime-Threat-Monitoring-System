apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: krtms
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: event-collector
        static_configs:
          - targets: ["event-collector:8080"]
      - job_name: analyzer
        static_configs:
          - targets: ["analyzer:8081"]
      - job_name: alert-manager
        static_configs:
          - targets: ["alert-manager:8082"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: krtms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: krtms
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
