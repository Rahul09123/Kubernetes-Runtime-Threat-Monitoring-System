apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-collector
  namespace: krtms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-collector
  template:
    metadata:
      labels:
        app: event-collector
    spec:
      serviceAccountName: event-collector-sa
      containers:
        - name: event-collector
          image: ghcr.io/your-org/event-collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_URL
              value: nats://nats:4222
            - name: HTTP_ADDR
              value: :8080
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: event-collector
  namespace: krtms
spec:
  selector:
    app: event-collector
  ports:
    - name: http
      port: 8080
      targetPort: 8080
