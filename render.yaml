services:
  - type: web
    name: nats
    runtime: image
    image:
      url: docker.io/library/nats:2.10-alpine
    plan: free

  - type: web
    name: event-collector
    runtime: image
    image:
      url: ghcr.io/rahul09123/event-collector:latest
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NATS_URL
        value: nats://nats:4222
      - key: HTTP_ADDR
        value: :8080

  - type: web
    name: analyzer
    runtime: image
    image:
      url: ghcr.io/rahul09123/analyzer:latest
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NATS_URL
        value: nats://nats:4222
      - key: HTTP_ADDR
        value: :8081

  - type: web
    name: alert-manager
    runtime: image
    image:
      url: ghcr.io/rahul09123/alert-manager:latest
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NATS_URL
        value: nats://nats:4222
      - key: HTTP_ADDR
        value: :8082

  - type: web
    name: prometheus
    runtime: image
    image:
      url: docker.io/prom/prometheus:v2.54.1
    plan: free
